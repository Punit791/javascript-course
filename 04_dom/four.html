<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punit with code | DOM </title>
</head>
<body>
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>
    // hum function se DOM kar rahe hai data ko page par rakh rahe hai 
    function addlanguage(langName) {
        const li = document.createElement("li");  // sabse pahle li tag create kiye
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)   // isme querySelector('.language')  class(<ul class="language">) ko access kiye  .appendChild(li) isse page par kaam hoga 

    }
    addlanguage("python")  // function ko call kiye or page me page bhi add hoga 
    addlanguage("typescript")
        // but ye function se tree matle DOM ko tree bhi mante hai, to tree me travel jayda karna padega isliye 
        
        
        // ye function 
    function addOptiLanguage(langName) {
        const li = document.createElement('li')  // yaha par but same variable hai but error nahi hai kyuki scope{} ki wajah se
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)

    }
    addOptiLanguage('golang')


    //Edit
    const secondLang = document.querySelector('li:nth-child(2)') // python ko select hoga , li me dusre ko select kiya 
    console.log((secondLang)); // Chrome console me dekhna 
    // secondLang.innerHTML = "Mojo" // ye method se bhi ho sakta hai 
    const newli = document.createElement('li')
    newli.textContent = "Mojo"
    secondLang.replaceWith(newli)


    //Edit
    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML =  '<li>TypeScript</li>'

    // Remove
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()  // last element delete ho jaayega
</script>
</html>
